<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Operador Ternário: Receba um número via prompt e mostre no console: 
        // "Positivo" se maior que 0, "Negativo" se menor que 0, ou "Zero" 
        // caso contrário, usando apenas operador ternário. 
        let numero = prompt("Digite um número:");
        let resultado = (numero > 0) ? "Positivo" : (numero < 0) ? "Negativo" : "Zero";
        console.log(resultado);
    </script>
</body>
</html>
