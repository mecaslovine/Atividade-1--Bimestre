    <script>
        // 2-a) Declare uma constante PI com valor 3.14159. 
        // Tente atribuir outro valor a PI e 
        //veja o erro no console. Explique por que isso acontece. 
        const PI = 3.14159;
        const PI = 3.15
        console.log({PI})
        ##//Explicação: aparece um erro de sintaxe (Identifier 'PI' has already
        //been declared). Como a const é uma constante, ou seja, um valor que

        //2-b) Declare uma constante SemanasDoAno sem atribuir valor. 
        // Na linha seguinte atribua o valor 52. O que ocorre?
        const SemanasDoAno;
        SemanasDoAno = 52;
        ##//Explicação: a regra do JavaScript exige que toda const 
        //obrigatoriamente receba um valor no mesmo momento em que é declarada.

    </script>
