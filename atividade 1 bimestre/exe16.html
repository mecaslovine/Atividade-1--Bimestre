<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Dado o array [1, 2, 3, 4, 5], use map para criar um novo array 
        // com cada número dobrado.
        let numeros = [2-6];
        let numerosDobrados = numeros.map(function(numeroAtual) {
        return numeroAtual * 2; 
        });
        console.log("Original: ", numeros);
        console.log("Dobrado: ", numerosDobrados);
    </script>
</body>
</html>
