<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
    //Declaração com let:
//Crie uma variável let idade e atribua sua idade. 
// Depois, atribua um novo valor 
//representando a idade daqui a 5 anos. 
// Mostre os dois valores no console: “Minha 
//idade hoje é <idade> e daqui a 5 anos será <nova_idade>”

    let idade = parseInt(prompt("Escreva a idade:"));
    console.log(`A sua idade é ${idade} e a sua idade daqui 5 anos é ${idade + 5}`);
    </script>
</body>
</html>
