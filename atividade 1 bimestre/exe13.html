<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Crie um objeto carro com propriedades marca, modelo e ano. 
        //Mostre todas as propriedades no console,
        //usando uma instrução console.log para cada uma das propriedades.
        let carro = {
        marca: "Toyota",   // Substitua pela marca que preferir
        modelo: "Corolla", // Substitua pelo modelo que preferir
        ano: 2023          // Substitua pelo ano
        };
        console.log("A marca é: " + carro.marca);
        console.log("O modelo é: " + carro.modelo);
        console.log("O ano é: " + carro.ano);
    </script>
</body>
</html>
