<!DOCTYPE html>

<body>
    <script>
        //Dado o array [5, 1, 9, 3, 7], ordene-o em ordem crescente usando sort. 
        let numeros = [5, 1, 9, 3, 7];
        numeros.sort(function(a, b) {
        return a - b;
        });
        console.log("Array ordenado:", numeros);
    </script>
</body>
